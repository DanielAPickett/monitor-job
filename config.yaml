# =============================================================================
# GIS Job Monitor — configuration (v2)
# Remote jobs from ANYWHERE pass. In-person/hybrid jobs pass ONLY if located
# in one of the local_areas below (Orange County, CA).
# No secrets go in here (API keys + SMTP come from environment / GitHub Secrets).
# =============================================================================

notify:
  # Overridden by the NTFY_TOPIC repo secret if set (yours is).
  ntfy_topic: "danny-gis-jobs-CHANGE-ME"
  ntfy_priority: high          # max | high | default | low | min

  # Optional second channel. Needs SMTP_HOST / SMTP_USER / SMTP_PASS secrets.
  email_enabled: false
  email_to: "you@example.com"

# -----------------------------------------------------------------------------
# Scoring (per posting):
#   +3 GIS keyword in the title (+1 if only in the description)
#   +1 for each of YOUR stack keywords found
#   +2 if the title is a level you fit (technician/analyst/specialist/etc.)
#   -2 if the title looks senior/lead/manager (kept, just ranked lower)
#   +1 if it's remote
# Sent only if NEW and score >= min_score AND (remote OR located in local_areas).
# -----------------------------------------------------------------------------
filters:
  remote_only: true            # with local_areas below this means:
                               # "remote anywhere + OC exception"

  # Non-remote (in-person/hybrid) jobs still pass if their location contains
  # any of these strings. Add/remove cities freely.
  local_areas:
    ["orange county", "irvine", "santa ana", "anaheim", "orange, ca",
     "costa mesa", "tustin", "fullerton", "huntington beach", "newport",
     "mission viejo", "lake forest", "laguna niguel", "laguna hills",
     "laguna beach", "aliso viejo", "san clemente", "san juan capistrano",
     "rancho santa margarita", "dana point", "yorba linda", "brea",
     "garden grove", "westminster", "fountain valley", "buena park",
     "cypress", "placentia", "seal beach", "los alamitos", "stanton"]

  include_keywords:            # at least ONE must appear or the posting is ignored
    [gis, geospatial, arcgis, esri, cartograph, spatial, geographic, mapping, geomatics]

  boost_keywords:              # your stack — each one found raises the score
    [arcpy, python, "experience builder", arcade, survey123, "arcgis online", agol,
     "arcgis pro", "arcgis enterprise", fme, dashboard, "web map", "web appbuilder",
     sql, javascript, autocad, "field maps", tableau, qgis]

  good_titles:                 # levels you're a strong fit for
    [technician, analyst, specialist, associate, junior, entry, developer,
     cartographer, "gis i", "gis ii", "analyst i", "analyst ii", coordinator]

  senior_titles:               # deprioritized (not dropped)
    [senior, " lead", principal, manager, director, architect, " iii", " iv",
     supervisor, chief, "vp ", staff]

  min_score: 2

# -----------------------------------------------------------------------------
# SOURCES
# type: greenhouse | lever | usajobs | rss | workday
# Greenhouse: careers page job-boards.greenhouse.io/SLUG -> use that SLUG.
# Lever: jobs.lever.co/SLUG -> use that SLUG.
# GovernmentJobs (NeoGov) RSS: agency careers page
#   governmentjobs.com/careers/AGENCY -> feed is
#   https://www.governmentjobs.com/SearchEngine/JobsFeed?agency=AGENCY
# -----------------------------------------------------------------------------
sources:

  # ---- Remote-leaning (federal contractors; most need US citizenship) ----
  - name: "Geocgi"
    type: greenhouse
    slug: geocgi

  - name: "Ardent"
    type: greenhouse
    slug: ardentmc

  - name: "USAJOBS (federal, remote GIS)"
    type: usajobs
    keyword: GIS
    # job_category: "0150"     # optional: 0150 Geography, 1370 Cartography

  # ---- Orange County local-government (in-person/hybrid, pass via local_areas) ----
  # IMPORTANT: verify each feed URL loads XML in your browser before trusting it.
  # If an agency's careers page is governmentjobs.com/careers/SOMETHING, then
  # SOMETHING is the agency value below. A broken feed is skipped silently.
  - name: "County of Orange"
    type: rss
    url: "https://www.governmentjobs.com/SearchEngine/JobsFeed?agency=oc"

  - name: "OCTA"
    type: rss
    url: "https://www.governmentjobs.com/SearchEngine/JobsFeed?agency=octa"

  # ---- Templates: fill in and set enabled: true ----
  - name: "Example Lever company"
    type: lever
    slug: REPLACE_ME
    enabled: false

  - name: "Example CalOpps / other agency RSS"
    type: rss
    url: "PASTE_FEED_URL"
    enabled: false
